<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>cinegatto</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<link rel="apple-touch-icon" href="/static/icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="cinegatto">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  .header {
    text-align: center;
    margin-bottom: 16px;
  }
  .header pre {
    font-family: monospace;
    font-size: 1.2rem;
    line-height: 1.3;
    color: #fff;
    margin: 0;
  }
  .header .title {
    font-size: 1.4rem;
    font-weight: bold;
    color: #fff;
    margin: 4px 0;
  }
  .header-links {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 6px;
  }
  .header-links a {
    color: #666;
    text-decoration: none;
    transition: color 0.15s;
  }
  .header-links a:hover {
    color: #a0c4ff;
  }
  .status {
    text-align: center;
    margin-bottom: 12px;
  }
  .status .info {
    font-size: 0.85rem;
    color: #888;
  }
  .controls {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    font-size: 1.3rem;
    padding: 16px 28px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #16213e;
    color: #e0e0e0;
    transition: background 0.15s, transform 0.1s;
    min-width: 70px;
    touch-action: manipulation;
  }
  button:active {
    transform: scale(0.95);
    background: #0f3460;
  }
  button.primary {
    background: #533483;
    color: #fff;
    font-size: 1.5rem;
    padding: 20px 36px;
  }
  button.primary:active {
    background: #6a42a0;
  }
  .settings {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #16213e;
    padding: 10px 16px;
    border-radius: 10px;
    cursor: pointer;
    user-select: none;
    touch-action: manipulation;
    transition: background 0.15s;
  }
  .toggle.active {
    background: #533483;
  }
  .toggle .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #555;
    transition: background 0.15s;
  }
  .toggle.active .dot {
    background: #a0ffb0;
  }
  .toggle .label {
    font-size: 0.9rem;
  }
  .system-panel {
    width: 100%;
    max-width: 300px;
    margin: 16px auto;
    padding: 12px 16px;
    background: #16213e;
    border-radius: 10px;
    font-size: 0.85rem;
    color: #aaa;
  }
  .system-panel h2 {
    font-size: 0.9rem;
    color: #888;
    text-align: center;
    margin-bottom: 8px;
  }
  .sys-columns {
    display: flex;
    gap: 24px;
    justify-content: center;
  }
  .sys-col {
    flex: 0 0 auto;
  }
  .sys-cache-row {
    justify-content: center;
    margin-top: 4px;
  }
  .sys-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .sys-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #555;
    flex-shrink: 0;
  }
  .logs {
    width: 100%;
    max-width: 600px;
    margin: 16px auto 0;
  }
  .logs h2 {
    font-size: 1rem;
    margin-bottom: 8px;
    text-align: center;
    color: #888;
    cursor: pointer;
  }
  .log-entries {
    background: #0d1117;
    border-radius: 8px;
    padding: 12px;
    max-height: 300px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 0.75rem;
    line-height: 1.5;
    display: none;
  }
  .log-entries.open { display: block; }
  .log-entry { margin-bottom: 2px; }
  .log-entry .level-WARNING { color: #f0ad4e; }
  .log-entry .level-ERROR { color: #d9534f; }
  .log-entry .level-INFO { color: #5bc0de; }
  .log-entry .level-DEBUG { color: #666; }
</style>
</head>
<body>

<div class="header">
  <pre id="cat-art">/\_/\
( o.o )
&gt; ^ &lt;
</pre>
  <pre id="speech-bubble" style="display:none; color:#a0ffb0; margin:0;">  .---------.
 | HUU HAAA! |
  '---------'</pre>
  <div class="title">cinegatto</div>
  <div class="header-links">
    <a href="https://github.com/sleeepyjack/cinegatto" target="_blank" title="GitHub"><svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a>
    <a class="playlist-link" id="playlist-link" href="#" target="_blank" title="YouTube Playlist"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg></a>
  </div>
</div>

<div class="status">
  <div class="info" id="video-info">--</div>
</div>

<div class="controls">
  <button onclick="api('previous')">&#9664;&#9664;</button>
  <button class="primary" id="play-btn" onclick="togglePlay()">&#9654;</button>
  <button onclick="api('next')">&#9654;&#9654;</button>
  <button onclick="api('random_seek')">&#127922;</button>
</div>

<div class="settings">
  <div class="toggle" id="shuffle-toggle" onclick="toggleSetting('shuffle')">
    <div class="dot"></div>
    <div class="label">&#128256; Shuffle</div>
  </div>
  <div class="toggle" id="random-start-toggle" onclick="toggleSetting('random_start')">
    <div class="dot"></div>
    <div class="label">&#127922; Seek</div>
  </div>
  <div class="toggle" id="sync-btn" onclick="syncCache()">
    <div class="dot" id="sync-dot"></div>
    <div class="label">&#128260; Sync</div>
  </div>
</div>

<div class="system-panel" id="system-panel">
  <h2>Status</h2>
  <div class="sys-columns">
    <div class="sys-col">
      <div class="sys-row"><span class="sys-dot" id="dot-server"></span> Server</div>
      <div class="sys-row"><span class="sys-dot" id="dot-temp"></span> Temp: <span id="sys-temp">--</span></div>
    </div>
    <div class="sys-col">
      <div class="sys-row"><span class="sys-dot" id="dot-cpu"></span> CPU: <span id="sys-cpu">--</span></div>
      <div class="sys-row"><span class="sys-dot" id="dot-mem"></span> Mem: <span id="sys-mem">--</span></div>
    </div>
  </div>
  <div class="sys-row sys-cache-row"><span class="sys-dot" id="dot-cache"></span> Cache: <span id="sys-cache">--</span></div>
</div>

<div class="logs">
  <h2 onclick="toggleLogs()">Logs &#9662;</h2>
  <div class="log-entries" id="log-entries"></div>
</div>

<script>
let playing = false;
let settings = { shuffle: true, random_start: true };

let loadingHint = false;
function api(action) {
  if (action === 'next' || action === 'previous') {
    loadingHint = true;
    document.getElementById('video-info').textContent = 'Loading...';
  }
  fetch('/api/' + action, { method: 'POST' })
    .then(() => { setTimeout(updateStatus, 300); })
    .catch(console.error);
}

function togglePlay() {
  api(playing ? 'pause' : 'play');
}

function toggleSetting(key) {
  settings[key] = !settings[key];
  const body = {};
  body[key] = settings[key];
  fetch('/api/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  }).then(r => r.json()).then(data => {
    settings = data;
    renderSettings();
  }).catch(console.error);
}

function renderSettings() {
  const shuffleEl = document.getElementById('shuffle-toggle');
  const randomEl = document.getElementById('random-start-toggle');
  shuffleEl.classList.toggle('active', settings.shuffle);
  randomEl.classList.toggle('active', settings.random_start);
}

function formatTime(s) {
  if (!s || s <= 0) return '--:--';
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60);
  if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
  return m + ':' + String(sec).padStart(2,'0');
}

function updateStatus() {
  fetch('/api/status').then(r => r.json()).then(data => {
    playing = data.playing;
    document.getElementById('play-btn').innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
    const pos = data.playlist_position || '-';
    const total = data.playlist_size || '-';
    // Detect "loading" state: mpv returns default empty values while ytdl_hook resolves
    const isLoading = !data.playing && data.position === 0 && data.duration === 0 && !data.video_url;
    if (isLoading && loadingHint) {
      document.getElementById('video-info').textContent = 'Loading...';
    } else {
      loadingHint = false;
      document.getElementById('video-info').textContent =
        (playing ? 'Playing' : 'Paused') + ' ' + pos + '/' + total +
        ' \u2022 ' + formatTime(data.position) + ' / ' + formatTime(data.duration);
    }
  }).catch(() => {
    document.getElementById('video-info').textContent = 'Disconnected';
  });
}

function updateSettings() {
  fetch('/api/settings').then(r => r.json()).then(data => {
    settings = data;
    renderSettings();
    if (data.playlist_url) {
      document.getElementById('playlist-link').href = data.playlist_url;
    }
  }).catch(() => {});
}

function syncCache() {
  const dot = document.getElementById('sync-dot');
  dot.style.background = '#f0ad4e';
  fetch('/api/sync', { method: 'POST' }).then(r => r.json()).then(data => {
    dot.style.background = data.enqueued > 0 ? '#a0ffb0' : '#5bc0de';
    setTimeout(() => { dot.style.background = '#555'; }, 3000);
  }).catch(() => { dot.style.background = '#d9534f'; });
}

function dotColor(level) {
  if (level === 'green') return '#a0ffb0';
  if (level === 'yellow') return '#f0ad4e';
  if (level === 'red') return '#d9534f';
  return '#555';
}

function updateSystemStatus() {
  fetch('/api/system').then(r => r.json()).then(data => {
    // Server: green (healthy), yellow (degraded — yt blocked), red (down)
    const serverLevel = data.yt_blocked ? 'yellow' : 'green';
    document.getElementById('dot-server').style.background = dotColor(serverLevel);

    // Temperature: green (<60°C), yellow (60-75°C), red (>75°C)
    const tempLevel = data.temp_c > 75 ? 'red' : data.temp_c > 60 ? 'yellow' : 'green';
    document.getElementById('dot-temp').style.background = dotColor(data.temp_c > 0 ? tempLevel : 'green');
    document.getElementById('sys-temp').textContent = data.temp_c > 0 ? data.temp_c + '\u00B0C' : '--';

    // CPU: green (<50%), yellow (50-80%), red (>80%)
    const cpuLevel = data.cpu_pct > 80 ? 'red' : data.cpu_pct > 50 ? 'yellow' : 'green';
    document.getElementById('dot-cpu').style.background = dotColor(cpuLevel);
    document.getElementById('sys-cpu').textContent = data.cpu_pct + '%';

    // Memory
    const memLevel = data.mem_pct > 90 ? 'red' : data.mem_pct > 70 ? 'yellow' : 'green';
    document.getElementById('dot-mem').style.background = dotColor(memLevel);
    document.getElementById('sys-mem').textContent = data.mem_pct + '%';

    // Cache
    const allCached = data.cache_count >= data.cache_total && data.cache_total > 0;
    const cacheLevel = data.yt_blocked ? 'red' : allCached ? 'green' : data.cache_downloading ? 'yellow' : 'yellow';
    document.getElementById('dot-cache').style.background = dotColor(cacheLevel);
    const diskPct = data.cache_disk_pct != null ? data.cache_disk_pct + '% full, ' : '';
    document.getElementById('sys-cache').textContent =
      diskPct + data.cache_count + '/' + data.cache_total + ' videos';
  }).catch(() => {
    document.getElementById('dot-server').style.background = dotColor('red');
  });
}

let logsOpen = false;
let logsUserScrolled = false;

function toggleLogs() {
  logsOpen = !logsOpen;
  document.getElementById('log-entries').classList.toggle('open', logsOpen);
  if (logsOpen) { logsUserScrolled = false; updateLogs(); }
}

document.getElementById('log-entries').addEventListener('scroll', function() {
  const el = this;
  // If user is near the bottom (within 30px), consider it "following"
  logsUserScrolled = (el.scrollTop + el.clientHeight) < (el.scrollHeight - 30);
});

function updateLogs() {
  if (!logsOpen) return;
  fetch('/api/logs?limit=50').then(r => r.json()).then(data => {
    const el = document.getElementById('log-entries');
    // Build DOM nodes instead of innerHTML to avoid XSS from log messages
    el.textContent = '';
    data.entries.forEach(e => {
      const div = document.createElement('div');
      div.className = 'log-entry';
      const span = document.createElement('span');
      span.className = 'level-' + (e.level || 'DEBUG');
      span.textContent = e.level || 'DEBUG';
      div.appendChild(span);
      div.appendChild(document.createTextNode(' ' + (e.message || '')));
      el.appendChild(div);
    });
    if (!logsUserScrolled) {
      el.scrollTop = el.scrollHeight;
    }
  }).catch(() => {});
}

setInterval(updateStatus, 2000);
setInterval(updateLogs, 5000);
setInterval(updateSystemStatus, 10000);
updateStatus();
updateSettings();
updateSystemStatus();

// Easter egg: click the cat 3 times
let catClicks = 0;
let catTimer = null;
document.getElementById('cat-art').addEventListener('click', function() {
  catClicks++;
  clearTimeout(catTimer);
  catTimer = setTimeout(() => { catClicks = 0; }, 1000);
  if (catClicks >= 3) {
    catClicks = 0;
    const bubble = document.getElementById('speech-bubble');
    bubble.style.display = 'block';
    setTimeout(() => { bubble.style.display = 'none'; }, 3000);
  }
});
</script>

</body>
</html>

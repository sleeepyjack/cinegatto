<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>cinegatto</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  .header {
    text-align: center;
    margin-bottom: 16px;
  }
  .header pre {
    font-family: monospace;
    font-size: 1.2rem;
    line-height: 1.3;
    color: #fff;
    margin: 0;
  }
  .header .title {
    font-size: 1.4rem;
    font-weight: bold;
    color: #fff;
    margin: 4px 0;
  }
  .header a {
    color: #888;
    font-size: 0.8rem;
    text-decoration: none;
  }
  .header a:hover {
    color: #a0c4ff;
    text-decoration: underline;
  }
  .playlist-link {
    display: inline-block;
    margin-top: 4px;
  }
  .status {
    text-align: center;
    margin-bottom: 24px;
    min-height: 60px;
  }
  .status .title {
    font-size: 1.1rem;
    color: #a0c4ff;
    margin-bottom: 4px;
    word-break: break-word;
  }
  .status .info {
    font-size: 0.85rem;
    color: #888;
  }
  .controls {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    font-size: 1.3rem;
    padding: 16px 28px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #16213e;
    color: #e0e0e0;
    transition: background 0.15s, transform 0.1s;
    min-width: 70px;
    touch-action: manipulation;
  }
  button:active {
    transform: scale(0.95);
    background: #0f3460;
  }
  button.primary {
    background: #533483;
    color: #fff;
    font-size: 1.5rem;
    padding: 20px 36px;
  }
  button.primary:active {
    background: #6a42a0;
  }
  .settings {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #16213e;
    padding: 10px 16px;
    border-radius: 10px;
    cursor: pointer;
    user-select: none;
    touch-action: manipulation;
    transition: background 0.15s;
  }
  .toggle.active {
    background: #533483;
  }
  .toggle .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #555;
    transition: background 0.15s;
  }
  .toggle.active .dot {
    background: #a0ffb0;
  }
  .toggle .label {
    font-size: 0.9rem;
  }
  .logs {
    width: 100%;
    max-width: 600px;
    margin-top: 16px;
  }
  .logs h2 {
    font-size: 1rem;
    margin-bottom: 8px;
    color: #888;
    cursor: pointer;
  }
  .log-entries {
    background: #0d1117;
    border-radius: 8px;
    padding: 12px;
    max-height: 300px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 0.75rem;
    line-height: 1.5;
    display: none;
  }
  .log-entries.open { display: block; }
  .log-entry { margin-bottom: 2px; }
  .log-entry .level-WARNING { color: #f0ad4e; }
  .log-entry .level-ERROR { color: #d9534f; }
  .log-entry .level-INFO { color: #5bc0de; }
  .log-entry .level-DEBUG { color: #666; }
</style>
</head>
<body>

<div class="header">
  <pre>  /\_/\
  ( o.o )
  &gt; ^ &lt;</pre>
  <div class="title">cinegatto</div>
  <a href="https://github.com/sleeepyjack/cinegatto" target="_blank">github.com/sleeepyjack/cinegatto</a>
  <br>
  <a class="playlist-link" id="playlist-link" href="#" target="_blank"></a>
</div>

<div class="status">
  <div class="title" id="video-title">--</div>
  <div class="info" id="video-info">--</div>
</div>

<div class="controls">
  <button onclick="api('previous')">&#9664;&#9664;</button>
  <button class="primary" id="play-btn" onclick="togglePlay()">&#9654;</button>
  <button onclick="api('next')">&#9654;&#9654;</button>
  <button onclick="api('random_seek')">&#127922;</button>
</div>

<div class="settings">
  <div class="toggle" id="shuffle-toggle" onclick="toggleSetting('shuffle')">
    <div class="dot"></div>
    <div class="label">&#128256; Shuffle</div>
  </div>
  <div class="toggle" id="random-start-toggle" onclick="toggleSetting('random_start')">
    <div class="dot"></div>
    <div class="label">&#127922; Seek</div>
  </div>
  <div class="toggle" id="sync-btn" onclick="syncCache()">
    <div class="dot" id="sync-dot"></div>
    <div class="label">&#128260; Sync</div>
  </div>
</div>

<div class="status" id="cache-status" style="font-size: 0.8rem; color: #666; margin-bottom: 16px;"></div>

<div class="logs">
  <h2 onclick="toggleLogs()">Logs &#9662;</h2>
  <div class="log-entries" id="log-entries"></div>
</div>

<script>
let playing = false;
let settings = { shuffle: true, random_start: true };

function api(action) {
  fetch('/api/' + action, { method: 'POST' }).catch(console.error);
}

function togglePlay() {
  api(playing ? 'pause' : 'play');
}

function toggleSetting(key) {
  settings[key] = !settings[key];
  const body = {};
  body[key] = settings[key];
  fetch('/api/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  }).then(r => r.json()).then(data => {
    settings = data;
    renderSettings();
  }).catch(console.error);
}

function renderSettings() {
  const shuffleEl = document.getElementById('shuffle-toggle');
  const randomEl = document.getElementById('random-start-toggle');
  shuffleEl.classList.toggle('active', settings.shuffle);
  randomEl.classList.toggle('active', settings.random_start);
}

function formatTime(s) {
  if (!s || s <= 0) return '--:--';
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60);
  if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
  return m + ':' + String(sec).padStart(2,'0');
}

function updateStatus() {
  fetch('/api/status').then(r => r.json()).then(data => {
    playing = data.playing;
    document.getElementById('play-btn').innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
    document.getElementById('video-title').textContent = data.video_title || '--';
    document.getElementById('video-info').textContent =
      (playing ? 'Playing' : 'Paused') + ' \u2022 ' +
      formatTime(data.position) + ' / ' + formatTime(data.duration);
  }).catch(() => {
    document.getElementById('video-info').textContent = 'Disconnected';
  });
}

function updateSettings() {
  fetch('/api/settings').then(r => r.json()).then(data => {
    settings = data;
    renderSettings();
    if (data.playlist_url) {
      const el = document.getElementById('playlist-link');
      el.href = data.playlist_url;
      el.textContent = 'YouTube Playlist';
    }
  }).catch(() => {});
}

function syncCache() {
  const dot = document.getElementById('sync-dot');
  dot.style.background = '#f0ad4e';
  fetch('/api/sync', { method: 'POST' }).then(r => r.json()).then(data => {
    dot.style.background = data.enqueued > 0 ? '#a0ffb0' : '#5bc0de';
    setTimeout(() => { dot.style.background = '#555'; }, 3000);
  }).catch(() => { dot.style.background = '#d9534f'; });
}

function updateCacheStatus() {
  fetch('/api/cache').then(r => r.json()).then(data => {
    if (!data.enabled) { return; }
    const el = document.getElementById('cache-status');
    const hitRate = (data.hits + data.misses) > 0
      ? Math.round(100 * data.hits / (data.hits + data.misses)) : 0;
    el.textContent = 'Cache: ' + data.count + ' videos, ' +
      data.total_size_mb + ' MB / ' + data.max_size_mb + ' MB' +
      ' (' + hitRate + '% hit rate)';
  }).catch(() => {});
}

let logsOpen = false;
let logsUserScrolled = false;

function toggleLogs() {
  logsOpen = !logsOpen;
  document.getElementById('log-entries').classList.toggle('open', logsOpen);
  if (logsOpen) { logsUserScrolled = false; updateLogs(); }
}

document.getElementById('log-entries').addEventListener('scroll', function() {
  const el = this;
  // If user is near the bottom (within 30px), consider it "following"
  logsUserScrolled = (el.scrollTop + el.clientHeight) < (el.scrollHeight - 30);
});

function updateLogs() {
  if (!logsOpen) return;
  fetch('/api/logs?limit=50').then(r => r.json()).then(data => {
    const el = document.getElementById('log-entries');
    el.innerHTML = data.entries.map(e =>
      '<div class="log-entry"><span class="level-' + e.level + '">' +
      e.level + '</span> ' + (e.message || '') + '</div>'
    ).join('');
    if (!logsUserScrolled) {
      el.scrollTop = el.scrollHeight;
    }
  }).catch(() => {});
}

setInterval(updateStatus, 2000);
setInterval(updateLogs, 5000);
setInterval(updateCacheStatus, 10000);
updateStatus();
updateSettings();
updateCacheStatus();
</script>

</body>
</html>
